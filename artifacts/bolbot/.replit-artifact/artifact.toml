kind = "web"
previewPath = "/"
title = "BolBot — Voice AI Tutor"
version = "1.0.0"
id = "artifacts/bolbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19915

[services.development]
run = "pnpm --filter @workspace/bolbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bolbot", "run", "build" ]
publicDir = "artifacts/bolbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19915"
BASE_PATH = "/"
